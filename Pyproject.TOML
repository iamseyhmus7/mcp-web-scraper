[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-web-scraper"
version = "0.1.1"
description = "Autonomous Playwright-based web scraper via MCP protocol"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Şeyhmus OK", email = "seyhmusok01@gmail.com" }
]
keywords = ["mcp", "playwright", "web-scraper", "browser-automation", "data-extraction"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "mcp>=1.19.0",
    "playwright>=1.40.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",
    "anyio>=4.7.0",
    "tenacity>=8.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-playwright>=0.4.0",
    "pytest-mock>=3.12.0",
    "ruff>=0.8.0",
]

[project.scripts]
mcp-web-scraper = "mcp_web_scraper.server:main"

[project.urls]
Homepage   = "https://github.com/iamseyhmus7/mcp-web-scraper"
Repository = "https://github.com/iamseyhmus7/mcp-web-scraper"
Issues     = "https://github.com/iamseyhmus7/mcp-web-scraper/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_web_scraper"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]